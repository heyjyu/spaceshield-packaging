<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPACE SHIELD · 패키지 관리대장 v1.3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://tnuzqrqxptxrfozzjjek.supabase.co" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,400..800&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.5"></script>
<style>
:root{
  --ink:#17181a; --paper:#f4f4f1; --card:#fff;
  --line:#e2e1dc; --line-strong:#c9c8c2; --muted:#83837d;
  --tag:#f0b429; --tag-soft:#fdf3d7;
  --ok:#2e7d4f; --ok-soft:#e8f3ec;
  --warn:#c0392b; --warn-soft:#fbeae7;
  --blue:#2b5f9e; --blue-soft:#e9f0f8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
.mono{font-family:'IBM Plex Mono',monospace}

/* ── 헤더 ── */
header{background:var(--ink);color:#fff;padding:0 24px}
.hd-top{display:flex;align-items:center;gap:12px;min-height:60px;padding:8px 0;flex-wrap:wrap}
.brand{font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 118;font-weight:800;font-size:19px;letter-spacing:.14em;text-transform:uppercase;white-space:nowrap}
.brand small{display:block;font-family:'Noto Sans KR';font-weight:400;font-size:11px;letter-spacing:.28em;color:#b9b9b3;margin-top:-2px}
.hd-sp{flex:1}
.hd-btn{background:transparent;border:1px solid #4a4a48;color:#e6e6e2;border-radius:6px;padding:7px 14px;font-size:13px}
.hd-btn:hover{border-color:#8a8a86}
.hd-btn.primary{background:var(--tag);border-color:var(--tag);color:var(--ink);font-weight:700}
.auth-state{color:#b9b9b3;font-size:12px;white-space:nowrap}
.auth-state b{color:#fff;font-weight:600}
.tabs{display:flex;gap:2px}
.tab{background:transparent;border:none;color:#9a9a94;padding:10px 18px 12px;font-size:14px;font-weight:500;border-bottom:3px solid transparent}
.tab.on{color:#fff;border-bottom-color:var(--tag)}

/* ── 요약 ── */
.summary{display:flex;background:var(--card);border-bottom:1px solid var(--line);overflow-x:auto}
.sum-cell{padding:12px 22px;border-right:1px solid var(--line);min-width:150px}
.sum-cell .lbl{font-size:11px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.sum-cell .val{font-family:'IBM Plex Mono';font-size:21px;font-weight:600;margin-top:2px}
.sum-cell .val small{font-size:12px;color:var(--muted);font-weight:400}
.sum-cell.alert .val{color:var(--warn)}

/* ── 레이아웃: 사이드바 + 콘텐츠 ── */
.wrap{display:flex;gap:20px;padding:20px 24px;max-width:1600px;margin:0 auto;align-items:flex-start}
aside{width:210px;flex-shrink:0;position:sticky;top:16px}
.sb-box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
.sb-box h4{font-size:11px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
#q{width:100%;border:1px solid var(--line-strong);border-radius:8px;padding:9px 11px;font-size:13.5px;font-family:inherit}
.f-btn{display:flex;justify-content:space-between;align-items:center;width:100%;background:none;border:none;border-radius:7px;padding:7px 9px;font-size:13px;color:#444;text-align:left}
.f-btn:hover{background:var(--paper)}
.f-btn.on{background:var(--ink);color:#fff;font-weight:600}
.f-btn .c{font-family:'IBM Plex Mono';font-size:11.5px;color:var(--muted)}
.f-btn.on .c{color:#cfcfc9}
#sortSel{width:100%;border:1px solid var(--line-strong);border-radius:8px;padding:8px 9px;font-size:13px;font-family:inherit;background:#fff}
.content{flex:1;min-width:0}
.note-bar{background:var(--tag-soft);border:1px solid #ecd9a0;border-radius:8px;padding:9px 14px;font-size:12.5px;color:#6b5200;margin-bottom:16px}
.result-line{font-size:12.5px;color:var(--muted);margin-bottom:10px}

/* ── 품목 카드 ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.grid.v-lg{grid-template-columns:repeat(auto-fill,minmax(330px,1fr))}
.grid.v-sm{grid-template-columns:repeat(auto-fill,minmax(186px,1fr));gap:12px}
/* 보기 방식 토글 (요약바 우측) */
.sum-filter{align-self:center;margin-left:18px;border:1.5px solid var(--line-strong);background:#fff;color:#333;border-radius:9px;padding:9px 15px;font-size:13.5px;font-weight:600;font-family:inherit;white-space:nowrap;flex-shrink:0}
.sum-filter:hover{border-color:var(--ink)}
.sum-filter.on{background:var(--tag);border-color:var(--tag);color:var(--ink)}
.view-toggle{margin-left:auto;display:flex;align-items:center;gap:3px;padding:0 18px;flex-shrink:0}
.view-toggle .vt-lbl{font-size:11px;color:var(--muted);margin-right:4px}
.view-toggle button{border:1px solid var(--line-strong);background:#fff;color:#555;font-size:12.5px;padding:5px 11px;border-radius:7px;font-family:inherit}
.view-toggle button:hover{background:var(--paper)}
.view-toggle button.on{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:600}
.item-card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s;display:flex;flex-direction:column}
.item-card:hover{box-shadow:0 6px 18px rgba(0,0,0,.10);transform:translateY(-2px)}
.item-card:focus-visible{outline:3px solid var(--tag);outline-offset:2px}
.ph{position:relative;aspect-ratio:4/3;background:#efefec;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ph img{width:100%;height:100%;object-fit:cover;display:block}
.ph .no-photo{color:var(--muted);font-size:12px;text-align:center;line-height:1.7}
.ph .no-photo .s{font-family:'Archivo';font-weight:800;font-size:28px;color:#d6d5d0;letter-spacing:.1em;display:block}
.ph .badge-float{position:absolute;top:9px;left:9px;display:flex;gap:5px}
.ph-nav{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,.82);color:#333;font-size:19px;line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:2}
.ph-nav:hover{background:#fff}
.ph-nav.prev{left:8px}
.ph-nav.next{right:8px}
.ph-count{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono';z-index:2}
.dt-photo .cam.del{right:auto;left:10px;background:rgba(192,57,43,.9);color:#fff}
.type-inline{display:inline-block;border:1px solid var(--line-strong);border-radius:4px;padding:0 7px;font-size:10.5px;color:#555;font-weight:500;font-family:'Noto Sans KR';letter-spacing:0}
/* 주문 이력 */
.hist{margin-top:12px;border-top:1px solid var(--line);padding-top:10px}
.hist h4{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.hist table{width:100%;border-collapse:collapse;font-size:12px}
.hist th{font-size:10.5px;color:var(--muted);font-weight:600;text-align:right;padding:3px 6px;border-bottom:1px solid var(--line)}
.hist th:first-child,.hist td:first-child{text-align:left}
.hist td{padding:4px 6px;text-align:right;border-bottom:1px solid #f0efeb;font-family:'IBM Plex Mono'}
.hist td:first-child{font-family:'Noto Sans KR';color:#555}
.hist td .st{font-family:'Noto Sans KR';font-size:10.5px;border-radius:4px;padding:0 6px;font-weight:600}
.hist td .st.done{background:var(--ok-soft);color:var(--ok)}
.hist td .st.run{background:var(--blue-soft);color:var(--blue)}
.hist td .st.req{background:var(--warn-soft);color:var(--warn)}
.yr-line{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.yr-chip{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:4px 10px;font-size:11.5px;color:#555}
.yr-chip b{font-family:'IBM Plex Mono';color:var(--ink);font-weight:600}
.ph .cam{position:absolute;bottom:8px;right:8px;background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:6px;padding:3px 9px;font-size:11.5px;color:#555}
.badge{display:inline-block;border-radius:5px;padding:2px 9px;font-size:11px;font-weight:700}
.badge.low{background:var(--warn);color:#fff}
.badge.prog{background:var(--blue);color:#fff}
.badge.draft{background:#6b4fa1;color:#fff}
.badge.disc{background:#4a4a48;color:#fff}
.badge.req{background:#e67e22;color:#fff}
.badge.dsgn{background:#f0b429;color:#3a2e00}
.badge.set{background:#fff;border:1px dashed var(--line-strong);color:var(--muted);font-weight:600}
/* 폼 사진 관리 */
.photo-manage{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.ph-thumb{position:relative;width:74px;height:74px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.ph-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.ph-thumb .rep{position:absolute;top:0;left:0;background:var(--tag);color:var(--ink);font-size:9px;font-weight:700;padding:1px 5px;border-bottom-right-radius:6px}
.ph-thumb button{position:absolute;top:2px;right:2px;width:19px;height:19px;border:none;border-radius:50%;background:rgba(20,20,20,.72);color:#fff;font-size:13px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ph-add{width:74px;height:74px;border:1.5px dashed var(--line-strong);background:var(--paper);border-radius:8px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer}
.ph-add:hover{border-color:var(--ink);color:var(--ink)}
.ph-note{font-size:12.5px;color:var(--muted);padding:6px 0}
.badge-btn{border:none;background:none;padding:0;margin:0;cursor:pointer;font:inherit;line-height:normal;display:inline-block;vertical-align:top}
.badge-btn:hover{filter:brightness(1.05)}
.status-menu{position:fixed;z-index:200;background:#fff;border:1px solid var(--line-strong);border-radius:11px;box-shadow:0 10px 28px rgba(0,0,0,.18);padding:5px;display:none;min-width:200px}
.status-menu.on{display:block}
.status-menu button{display:block;width:100%;text-align:left;border:none;background:none;padding:8px 12px;font-size:13px;border-radius:7px;font-family:inherit;color:#333;white-space:nowrap}
.status-menu button:hover{background:var(--paper)}
.status-menu button.on{font-weight:700;background:var(--tag-soft)}
.ic-info{padding:11px 14px 13px}
.ic-mid{font-family:'IBM Plex Mono';font-size:12px;font-weight:600;letter-spacing:.06em;color:#c0392b}
.ic-code{font-family:'IBM Plex Mono';font-size:11px;font-weight:600;letter-spacing:.05em;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.ic-code .oc{font-size:10.5px;font-weight:400}
.ic-name{font-weight:700;font-size:15px;margin:1px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ic-alias{font-size:11.5px;color:var(--muted);margin-bottom:7px;min-height:17px}
.ic-alias b{color:#8a6400;background:var(--tag-soft);border-radius:4px;padding:0 6px;font-weight:600}
.stk-line{display:flex;align-items:baseline;gap:6px;font-size:12px;color:var(--muted)}
.stk-line b{font-family:'IBM Plex Mono';font-size:17px;font-weight:600;color:var(--ink)}
.stk-split{display:flex;margin-top:6px;border:1px solid var(--line);border-radius:7px;overflow:hidden}
.stk-split div{flex:1;text-align:center;padding:4px 2px;font-size:10.5px;color:var(--muted);background:var(--paper)}
.stk-split div b{display:block;font-family:'IBM Plex Mono';font-size:12.5px;color:var(--ink);font-weight:600}
.stk-split div+div{border-left:1px solid var(--line)}
.stk-split div.hot{background:var(--tag-soft)}
/* 카드 액션 버튼 */
.card-actions{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;align-items:stretch}
.card-actions .ca{flex:0 0 auto;width:33px;height:31px;border:1px solid var(--line);background:var(--paper);border-radius:8px;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}
.card-actions .ca:hover{background:#fff;border-color:var(--line-strong)}
.card-actions .ca.off{opacity:.34}
.card-actions .ca.off:hover{opacity:.7}
.card-actions .ca.order{flex:1;width:auto;font-size:12.5px;font-weight:700;gap:3px;background:var(--tag-soft);border-color:#ecd9a0;color:#8a6400;white-space:nowrap}
.card-actions .ca.order:hover{background:var(--tag);border-color:var(--tag);color:var(--ink)}
.stk-split b.editable{cursor:text;text-decoration:underline dotted var(--line-strong);text-underline-offset:2px}
.stk-split b.editable:hover{color:var(--blue)}
.stk-split .stk-edit{font-size:12.5px;padding:0 2px;border-radius:4px}

/* ── 상세 모달 ── */
.overlay{position:fixed;inset:0;background:rgba(20,20,20,.5);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow-y:auto}
.overlay.on{display:flex}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:560px;overflow:hidden}
.modal.pad{padding:24px}
.dt-photo{position:relative;aspect-ratio:16/9;background:#efefec;display:flex;align-items:center;justify-content:center}
.dt-photo img{width:100%;height:100%;object-fit:cover}
.dt-photo .no-photo{color:var(--muted);font-size:13px}
.dt-photo .cam{position:absolute;bottom:10px;right:10px;background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:7px;padding:5px 12px;font-size:12px}
.dt-photo .x{position:absolute;top:10px;right:10px;background:rgba(23,24,26,.75);color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;line-height:1}
.dt-body{padding:18px 22px 22px}
.dt-code{font-family:'IBM Plex Mono';font-size:12px;font-weight:600;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.dt-name{font-size:19px;font-weight:700;margin:1px 0 2px}
.dt-sub{font-size:12.5px;color:var(--muted)}
.dt-cn{display:inline-block;margin-top:7px;background:var(--tag-soft);border:1px solid #ecd9a0;border-radius:5px;padding:2px 10px;font-size:12.5px}
.dt-stocks{display:flex;gap:8px;margin:14px 0 4px}
.stk{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:9px 8px;text-align:center}
.stk .l{font-size:11px;color:var(--muted)}
.stk .n{font-family:'IBM Plex Mono';font-size:17px;font-weight:600;margin-top:1px}
.stk.hot{background:var(--tag-soft);border-color:#ecd9a0}
.stk .n.editable{cursor:text;text-decoration:underline dotted var(--line-strong);text-underline-offset:3px}
.stk .n.editable:hover{color:var(--blue)}
.stk-edit{width:100%;border:1px solid var(--blue);border-radius:6px;padding:2px 3px;font-family:'IBM Plex Mono';font-size:16px;font-weight:600;text-align:center;background:#fff;-moz-appearance:textfield}
.dt-total{font-size:12.5px;color:var(--muted);margin-bottom:12px}
.dt-total b{font-family:'IBM Plex Mono';font-size:15px;color:var(--ink)}
.dt-meta{border-top:1px solid var(--line);padding-top:12px;font-size:12.5px;color:#555;display:grid;grid-template-columns:1fr 1fr;gap:4px 14px}
.dt-meta span b{color:var(--ink);font-family:'IBM Plex Mono';font-weight:600}
.sheet-box{margin-top:12px;border:1px dashed var(--line-strong);border-radius:10px;padding:10px 12px;display:flex;gap:12px;align-items:center}
.sheet-box img{width:84px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--line);cursor:zoom-in}
.sheet-box .sheet-empty{width:84px;height:60px;border-radius:6px;background:var(--paper);display:flex;align-items:center;justify-content:center;font-size:10.5px;color:var(--muted);text-align:center}
.sheet-box .info{flex:1;font-size:12px;color:var(--muted)}
.sheet-box .info b{display:block;font-size:12.5px;color:var(--ink);font-weight:600}
.sheet-btns{display:flex;flex-direction:column;gap:5px}
.sheet-btns button{border:1px solid var(--line-strong);background:#fff;border-radius:6px;padding:5px 10px;font-size:11.5px;white-space:nowrap}
.sheet-btns button.gold{background:var(--tag);border-color:var(--tag);font-weight:700}
.asset-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.asset-tile{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:13px 6px 11px;display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center;transition:box-shadow .12s,border-color .12s,background .12s}
.asset-tile:hover{background:#fff;border-color:var(--line-strong);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.asset-tile .ic{font-size:21px;line-height:1}
.asset-tile .lb{font-weight:700;font-size:13.5px;color:var(--ink)}
.asset-tile .cap{font-size:10.5px;color:var(--muted)}
.asset-tile.set{background:var(--tag-soft);border-color:#ecd9a0}
.asset-tile.empty{opacity:.55}
.asset-tile.empty:hover{opacity:1}
.asset-edit{text-align:center;margin-top:7px}
.asset-edit button{background:none;border:none;color:var(--muted);font-size:11.5px;text-decoration:underline;cursor:pointer;font-family:inherit}
.asset-edit button:hover{color:var(--ink)}
.asset-edit .sep{color:var(--line-strong);margin:0 6px}
.ord-mini{margin-top:12px;border-top:1px solid var(--line);padding-top:10px;font-size:12.5px}
.ord-mini h4{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px}
.ord-mini .row{display:flex;justify-content:space-between;padding:2px 0;color:#555}
.dday{display:inline-block;border-radius:4px;padding:0 6px;font-family:'IBM Plex Mono';font-size:11px;font-weight:600}
.dday.soon{background:var(--tag-soft);color:#8a6400}
.dday.over{background:var(--warn-soft);color:var(--warn)}
.dday.far{background:var(--paper);color:var(--muted)}
.dt-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.act{border:1px solid var(--line-strong);background:var(--card);border-radius:8px;padding:10px 4px;font-size:13px;font-weight:500}
.act:hover{background:var(--paper)}
.act.gold{background:var(--tag);border-color:var(--tag);font-weight:700}

/* 지시서 확대 보기 */
#zoomOverlay img{max-width:min(92vw,1000px);max-height:86vh;border-radius:10px;background:#fff}

/* ── 칸반 ── */
.kanban{display:grid;grid-template-columns:repeat(5,minmax(240px,1fr));gap:14px;overflow-x:auto;align-items:start}
.kcol{background:#ecece8;border:1px solid var(--line);border-radius:12px;padding:10px;min-height:200px}
.kcol h3{font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;padding:4px 6px 10px}
.kcol h3 .cnt{font-family:'IBM Plex Mono';font-size:12px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:0 8px;color:var(--muted)}
.kcol.c0 h3{color:var(--warn)}
.kcol.c1 h3{color:var(--blue)}
.kcol.c4 h3{color:var(--ok)}
.ocard{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:12px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.ocard.draggable{cursor:grab}
.ocard.draggable:active{cursor:grabbing}
.ocard.dragging{opacity:.45}
.kcol.drop-hover{background:#e4eefb;border-color:var(--blue);border-style:dashed}
.ocard .oc-code{font-family:'IBM Plex Mono';font-size:11.5px;font-weight:600;color:var(--muted)}
.ocard .oc-name{font-weight:700;font-size:13.5px;margin:2px 0 6px}
.ocard .oc-qty{font-family:'IBM Plex Mono';font-size:17px;font-weight:600}
.ocard .oc-qty small{font-size:11px;color:var(--muted);font-family:'Noto Sans KR'}
.oc-meta{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.6}
.oc-btns{display:flex;gap:6px;margin-top:10px}
.oc-btns button{flex:1;border:1px solid var(--line-strong);background:var(--card);border-radius:6px;padding:6px 2px;font-size:12px}
.oc-btns button.next{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:600}
.oc-btns button:hover{opacity:.85}

/* ── 폼 ── */
.modal h2{font-size:17px;margin-bottom:16px}
.f{margin-bottom:12px}
.f label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
.f input,.f textarea,.f select{width:100%;border:1px solid var(--line-strong);border-radius:7px;padding:8px 10px;font-size:14px;font-family:inherit;background:#fff}
.f textarea{resize:vertical;min-height:60px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.m-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.m-btns button{border-radius:7px;padding:9px 18px;font-size:14px;border:1px solid var(--line-strong);background:#fff}
.m-btns .save{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:600}

#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:8px;font-size:13.5px;display:none;z-index:99;max-width:90vw}
.empty{color:var(--muted);text-align:center;padding:40px 0;font-size:13px}
/* 로딩 스켈레톤 */
@keyframes shimmer{0%{background-position:-450px 0}100%{background-position:450px 0}}
.skel-box,.skel-line,.skel-bar{background:linear-gradient(90deg,#e9e9e5 25%,#f4f4f1 37%,#e9e9e5 63%);background-size:900px 100%;animation:shimmer 1.25s infinite linear;border-radius:6px}
.item-card.skel{cursor:default;pointer-events:none}
.item-card.skel .ph{background:#eee}
.item-card.skel .ph .skel-box{width:100%;height:100%;border-radius:0}
.skel-line{height:12px;margin:9px 0}
.skel-line.w40{width:40%}.skel-line.w60{width:60%}.skel-line.w80{width:80%}
.skel-bar{display:inline-block;width:66px;height:20px;vertical-align:middle}
@media(max-width:900px){
  .wrap{flex-direction:column}
  aside{width:100%;position:static}
  .kanban{grid-template-columns:repeat(5,260px)}
}
@media(max-width:600px){
  header{padding:0 14px}
  .hd-top{gap:8px}
  .brand{font-size:16px}
  .brand small{letter-spacing:.14em}
  .auth-state{order:5;width:100%;margin-top:-2px}
  .hd-btn{padding:6px 10px;font-size:12px}
  .hd-sp{display:none}
  .tab{padding:9px 12px 11px;font-size:13px}
}
</style>
</head>
<body>

<header>
  <div class="hd-top">
    <div class="brand">Space Shield<small>패키지 관리대장 · Packaging Ledger</small></div>
    <div class="hd-sp"></div>
    <span class="auth-state" id="authState"></span>
    <button class="hd-btn" onclick="exportData()">백업(JSON)</button>
    <button class="hd-btn" id="authBtn" onclick="authBtnClick()">로그인</button>
    <button class="hd-btn primary" onclick="openItemModal()">+ 품목 등록</button>
  </div>
  <div class="tabs">
    <button class="tab on" id="tabItems" onclick="switchView('items')">품목 카드</button>
    <button class="tab" id="tabKanban" onclick="switchView('kanban')">주문 칸반</button>
  </div>
</header>

<div class="summary" id="summary"></div>

<div class="wrap">
  <aside id="sidebar">
    <div class="sb-box">
      <h4>검색</h4>
      <input id="q" placeholder="2호, 반달, 코드, 별칭…" oninput="ui.q=this.value;renderItems()">
    </div>
    <div class="sb-box">
      <h4>유형</h4>
      <div id="typeFilters"></div>
    </div>
    <div class="sb-box">
      <h4>정렬</h4>
      <select id="sortSel" onchange="ui.sort=this.value;renderItems()">
        <option value="orders">발주 많은 순 (주력 우선)</option>
        <option value="low">재고 부족한 순</option>
        <option value="name">이름순</option>
      </select>
    </div>
  </aside>

  <div class="content">
    <div class="note-bar" id="noteBar">Supabase 공유 데이터 — 모두에게 같은 화면이 보입니다. <b>열람은 로그인 없이</b>, 품목 수정·발주·단계 이동은 <b>로그인</b> 후 가능합니다.</div>
    <section id="viewItems">
      <div class="result-line" id="resultLine"></div>
      <div class="grid" id="itemGrid"></div>
    </section>
    <section id="viewKanban" style="display:none"><div class="kanban" id="kanbanBoard"></div></section>
  </div>
</div>

<!-- 품목 상세 -->
<div class="overlay" id="detailOverlay"><div class="modal" id="detailModal"></div></div>

<!-- 지시서 확대 -->
<div class="overlay" id="zoomOverlay" onclick="this.classList.remove('on')"><img id="zoomImg" alt="작업지시서"></div>

<!-- 사진/지시서 업로드 -->
<input type="file" id="photoFile" accept="image/*" style="display:none" onchange="onPhotoPicked(event)">

<!-- 품목 등록/수정 -->
<div class="overlay" id="itemOverlay">
  <div class="modal pad">
    <h2 id="itemModalTitle">품목 등록</h2>
    <div class="f2">
      <div class="f"><label>한국명 <span style="color:#c0392b">*필수</span></label><input id="i_nameKo" placeholder="범용 박스 2호 (V2)"></div>
      <div class="f"><label>관리코드 (선택) · ID는 저장 시 자동부여</label><input id="i_code" placeholder="G-BOX-02 (비워도 됨)"></div>
    </div>
    <div class="f3">
      <div class="f"><label>유형</label>
        <select id="i_type"><option>박스·지류</option><option>비닐</option><option>부자재</option><option>스티커</option><option>기타</option></select>
      </div>
      <div class="f"><label>카테고리 (NAS 분류)</label><input id="i_cat" placeholder="G BOX / C OPP / Armor Flex"></div>
      <div class="f"><label>별칭 (물류팀 은어)</label><input id="i_alias" placeholder="예: 반달"></div>
    </div>
    <div class="f"><label>상태 (뱃지)</label>
      <select id="i_status">
        <option value="재고부족">재고부족</option>
        <option value="발주요청">발주요청</option>
        <option value="제작진행">제작진행</option>
        <option value="">(공란) — 표시 없음/자동</option>
        <option value="시안">시안</option>
        <option value="단종">단종</option>
        <option value="디자인변경">⚠️ 디자인변경 재발주</option>
      </select>
    </div>
    <div class="f"><label>영문명 (작업지시서 기준)</label><input id="i_nameEn"></div>
    <div class="f"><label>중문명 (거래처 소통용)</label><input id="i_nameCn" placeholder="通用纸盒 2号"></div>
    <div class="f"><label>규격 / 사양</label><input id="i_spec"></div>
    <div class="f3">
      <div class="f"><label>단가 (¥)</label><input id="i_price" type="number" step="0.01"></div>
      <div class="f"><label>MOQ</label><input id="i_moq" type="number"></div>
      <div class="f"><label>리드타임(일)</label><input id="i_lead" type="number"></div>
    </div>
    <div class="f3">
      <div class="f"><label>중국창고 재고</label><input id="i_sChina" type="number" value="0"></div>
      <div class="f"><label>포워딩 재고</label><input id="i_sFwd" type="number" value="0"></div>
      <div class="f"><label>국내 재고</label><input id="i_sKr" type="number" value="0"></div>
    </div>
    <div class="f"><label>안전재고</label><input id="i_safety" type="number" value="0"></div>
    <div class="f"><label>구매링크 URL</label><input id="i_buy" placeholder="https://... (재주문/구매 페이지)"></div>
    <div class="f"><label>NAS 전체 서버 경로</label><input id="i_nas" placeholder="\\NAS\SpaceShield\G STK\먼지제거스티커\"></div>
    <div class="f"><label>FLOW 기획서 URL</label><input id="i_flow" placeholder="https://..."></div>
    <div class="f"><label>메모</label><textarea id="i_memo" placeholder="거래처명, 담당자 위챗, 특이사항 등"></textarea></div>
    <div class="f"><label>사진 (여러 장 · 첫 장이 대표 썸네일)</label><div id="i_photos" class="photo-manage"></div></div>
    <div class="m-btns">
      <button onclick="tryClose('itemOverlay')">취소</button>
      <button class="save" onclick="saveItem()">저장</button>
    </div>
  </div>
</div>

<!-- 발주 요청 -->
<div class="overlay" id="orderOverlay">
  <div class="modal pad">
    <h2>발주 요청</h2>
    <div class="f"><label>품목</label><select id="o_item" onchange="prefillOrder()"></select></div>
    <div class="f3">
      <div class="f"><label>수량</label><input id="o_qty" type="number"></div>
      <div class="f"><label>단가 (¥)</label><input id="o_price" type="number" step="0.001"></div>
      <div class="f"><label>요청자</label><input id="o_by" placeholder="물류팀 조아름"></div>
    </div>
    <div class="f" style="margin-top:-4px"><span id="o_lastinfo" style="font-size:12px;color:var(--muted)"></span></div>
    <div class="f"><label>메모 (사유, 긴급 여부 등)</label><textarea id="o_memo"></textarea></div>
    <div class="m-btns">
      <button onclick="tryClose('orderOverlay')">취소</button>
      <button class="save" onclick="saveOrder()">요청 올리기</button>
    </div>
  </div>
</div>

<!-- 관리자 로그인 -->
<div class="overlay" id="loginOverlay">
  <div class="modal pad" style="max-width:380px">
    <h2>관리자 로그인</h2>
    <div class="f"><label>이메일</label><input id="l_email" type="email" placeholder="you@company.com"></div>
    <div class="f"><label>비밀번호</label><input id="l_pw" type="password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="m-btns">
      <button onclick="closeModal('loginOverlay')">취소</button>
      <button class="save" onclick="doLogin()">로그인</button>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-top:10px;line-height:1.6">Supabase Authentication 에 등록된 계정으로 로그인합니다. 열람은 로그인 없이 가능하고, 편집·발주·단계 이동만 로그인이 필요합니다.</div>
  </div>
</div>

<div id="statusMenu" class="status-menu"></div>
<div id="toast"></div>

<script>
/* ───────── 상태 ───────── */
const STAGES = [
  {id:'request',  name:'발주 요청',        cls:'c0'},
  {id:'ordered',  name:'발주완료 · 제작중', cls:'c1'},
  {id:'chinaWh',  name:'중국창고 보관',     cls:'c2'},
  {id:'forwarder',name:'포워딩 보관',       cls:'c3'},
  {id:'arrived',  name:'국내 입고완료',     cls:'c4'},
];
const TYPES=['박스·지류','비닐','부자재','스티커','기타'];

/* ───────── Supabase (publishable 키 — 공개 안전, RLS로 쓰기 차단) ───────── */
const SB_URL='https://tnuzqrqxptxrfozzjjek.supabase.co';
const SB_KEY='sb_publishable_BSLM7lCKgpZWRtweb687og_F1RqFAYN';
const BUCKET='pkg-images';
const sb = window.supabase.createClient(SB_URL, SB_KEY);
let session=null;

let state = { items:[], orders:[] };
let loaded=false;
let ui={q:'', type:'all', sort:'orders', chinaOnly:false, view:(()=>{try{return localStorage.getItem('pkg_view')||'md'}catch{return 'md'}})()};
let currentView='items', editingItemId=null, detailItemId=null, photoTarget=null;
let cardImgIdx={}, detailImgIdx=0;   // 사진 넘기기 인덱스(비영속)

/* DB(snake) ↔ 화면(camel) 매핑 */
function rowToItem(r){return {id:r.id, code:r.code, nameKo:r.name_ko, alias:r.alias||'', type:r.type||'기타', cat:r.cat||'', nameEn:r.name_en||'', nameCn:r.name_cn||'', spec:r.spec||'', price:Number(r.price)||0, moq:r.moq||0, lead:r.lead||14, safety:r.safety||0, stock:{china:r.stock_china||0, forwarder:r.stock_forwarder||0, korea:r.stock_korea||0}, memo:r.memo||'', nasPath:r.nas_path||'', flowUrl:r.flow_url||'', buyUrl:r.buy_url||'', status:r.status||'', photos:(Array.isArray(r.photos)&&r.photos.length)?r.photos:(r.photo?[r.photo]:[]), photo:r.photo||null, sheet:r.sheet||null};}
function itemToRow(i){return {code:i.code, name_ko:i.nameKo, alias:i.alias||'', type:i.type||'기타', cat:i.cat||'', name_en:i.nameEn||'', name_cn:i.nameCn||'', spec:i.spec||'', price:i.price||0, moq:i.moq||0, lead:i.lead||14, safety:i.safety||0, stock_china:i.stock.china||0, stock_forwarder:i.stock.forwarder||0, stock_korea:i.stock.korea||0, memo:i.memo||'', nas_path:i.nasPath||'', flow_url:i.flowUrl||'', buy_url:i.buyUrl||'', status:i.status||'', photos:i.photos||[], photo:(i.photos&&i.photos[0])||i.photo||'', sheet:i.sheet||''};}
function rowToOrder(r){return {id:r.id, itemId:r.item_id, stage:r.stage, qty:r.qty||0, price:Number(r.price)||0, by:r.requested_by||'', memo:r.memo||'', orderDate:r.order_date||'', eta:r.eta||'', created:r.created||''};}
function orderToRow(o){return {item_id:o.itemId, stage:o.stage, qty:o.qty||0, price:o.price||0, requested_by:o.by||'', memo:o.memo||'', order_date:o.orderDate||'', eta:o.eta||'', created:o.created||''};}

/* 로드 */
async function loadAll(){
  const [ir,or_]=await Promise.all([
    sb.from('pkg_items').select('*').order('id'),
    sb.from('pkg_orders').select('*').order('created',{ascending:false})
  ]);
  loaded=true;
  if(ir.error||or_.error){ showConnError((ir.error||or_.error).message); render(); return; }
  state.items=ir.data.map(rowToItem);
  state.orders=or_.data.map(rowToOrder);
  if(detailItemId && !state.items.find(x=>x.id===detailItemId)) detailItemId=null;
  render();
}
function showConnError(msg){
  $('noteBar').innerHTML=`⚠️ Supabase 연결/테이블 오류: <b>${esc(msg)}</b><br>대시보드 SQL Editor 에서 <code>supabase_schema.sql</code> 을 먼저 실행하세요.`;
  $('noteBar').style.background='var(--warn-soft)';$('noteBar').style.borderColor='#e6b8b0';$('noteBar').style.color='var(--warn)';
}

/* 실시간 동기화 — 다른 사용자의 변경을 자동 반영 (모두 같은 화면) */
let reloadTimer=null, pendingReload=false;
function scheduleReload(){
  if(stockEditing){ pendingReload=true; return; }   // 인라인 수정 중이면 끝난 뒤 반영
  clearTimeout(reloadTimer);
  reloadTimer=setTimeout(()=>{ pendingReload=false; loadAll(); }, 400);
}
function initRealtime(){
  sb.channel('pkg-live')
    .on('postgres_changes',{event:'*',schema:'public',table:'pkg_items'},scheduleReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'pkg_orders'},scheduleReload)
    .subscribe();
}

/* 저장 헬퍼 */
async function dbInsertItem(i){const {data,error}=await sb.from('pkg_items').insert(itemToRow(i)).select('id').single();if(error)throw error;return data.id;}
async function dbUpdateItem(i){const {error}=await sb.from('pkg_items').update(itemToRow(i)).eq('id',i.id);if(error)throw error;}
async function dbUpdateItemStock(i){const {error}=await sb.from('pkg_items').update({stock_china:i.stock.china,stock_forwarder:i.stock.forwarder,stock_korea:i.stock.korea}).eq('id',i.id);if(error)throw error;}
async function dbInsertOrder(o){const {data,error}=await sb.from('pkg_orders').insert(orderToRow(o)).select('id').single();if(error)throw error;o.id=data.id;}
async function dbUpdateOrder(o){const {error}=await sb.from('pkg_orders').update(orderToRow(o)).eq('id',o.id);if(error)throw error;}
async function dbDeleteOrder(id){const {error}=await sb.from('pkg_orders').delete().eq('id',id);if(error)throw error;}

/* ───────── 인증 ───────── */
async function initAuth(){
  const {data}=await sb.auth.getSession(); session=data.session;
  sb.auth.onAuthStateChange((_e,s)=>{session=s;renderAuthBar();render();});
  renderAuthBar();
}
function isAuthed(){return !!session;}
function renderAuthBar(){
  const email=session&&session.user&&session.user.email;
  $('authState').innerHTML=email?`<b>${esc(email)}</b> · 편집 가능`:'열람 모드';
  $('authBtn').textContent=email?'로그아웃':'로그인';
}
function authBtnClick(){ if(isAuthed()) sb.auth.signOut().then(()=>toast('로그아웃되었습니다')); else openLogin(); }
function openLogin(){ $('l_email').value=''; $('l_pw').value=''; $('loginOverlay').classList.add('on'); setTimeout(()=>$('l_email').focus(),50); }
async function doLogin(){
  const email=$('l_email').value.trim(), password=$('l_pw').value;
  if(!email||!password){toast('이메일과 비밀번호를 입력하세요');return;}
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){toast('로그인 실패: '+error.message);return;}
  closeModal('loginOverlay'); toast('로그인되었습니다 — 이제 편집할 수 있습니다');
}
function requireAuth(){ if(isAuthed())return true; toast('편집하려면 먼저 로그인하세요 (우측 상단 로그인)'); openLogin(); return false; }

/* ───────── 유틸 ───────── */
const $=id=>document.getElementById(id);
/* innerHTML 에 들어가는 사용자 입력은 전부 esc() 통과시킬 것 (읽기가 공개라 저장형 XSS는 모든 방문자에게 실행됨) */
const ESC_MAP={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>ESC_MAP[c]);
const fmt=n=>(n||0).toLocaleString('ko-KR');
const mid=i=>'#'+String(i.id||0).padStart(4,'0');  // 마스터 ID (DB id 4자리, 자동부여)
const today=()=>new Date().toISOString().slice(0,10);
function addDays(dateStr,d){const dt=new Date(dateStr);dt.setDate(dt.getDate()+d);return dt.toISOString().slice(0,10);}
function ddays(eta){if(!eta)return null;return Math.round((new Date(eta)-new Date(today()))/86400000);}
function toast(msg){const t=$('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',2800);}
function copyText(txt,msg){
  navigator.clipboard.writeText(txt).then(()=>toast(msg||'복사되었습니다'),()=>{
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast(msg||'복사되었습니다');
  });
}
function itemOf(o){return state.items.find(i=>i.id===o.itemId);}
function totalStock(i){return i.stock.china+i.stock.forwarder+i.stock.korea;}
function activeOrders(itemId){return state.orders.filter(o=>o.itemId===itemId&&o.stage!=='arrived');}
function orderCount(itemId){return state.orders.filter(o=>o.itemId===itemId).length;}
function statusBadge(i){
  switch(i.status){
    case '단종':    return '<span class="badge disc">단종</span>';
    case '시안':    return '<span class="badge draft">시안</span>';
    case '디자인변경': return '<span class="badge dsgn">⚠️ 디자인변경 재발주</span>';
    case '재고부족':  return '<span class="badge low">재고 부족</span>';
    case '발주요청':  return '<span class="badge req">발주 요청</span>';
    case '제작진행':  return '<span class="badge prog">제작 진행</span>';
  }
  // 자동
  if(totalStock(i)<i.safety)return '<span class="badge low">재고 부족</span>';
  if(activeOrders(i.id).length)return '<span class="badge prog">발주 진행중</span>';
  return '';
}
/* 배지를 버튼처럼 — 클릭하면 상태 바로 지정(로그인 시) */
function badgeBtn(i){
  const b=statusBadge(i);
  if(!isAuthed())return b;
  return `<button class="badge-btn" onclick="openStatusMenu(${i.id},event)" title="상태 변경">${b||'<span class="badge set">＋ 상태</span>'}</button>`;
}
function openStatusMenu(id,ev){
  ev.stopPropagation();
  if(!isAuthed()){requireAuth();return;}
  const it=state.items.find(x=>x.id===id); if(!it)return;
  const opts=[['재고부족','재고부족'],['발주요청','발주요청'],['제작진행','제작진행'],['','(공란)'],['시안','시안'],['단종','단종'],['디자인변경','⚠️']];
  const m=$('statusMenu');
  m.innerHTML=opts.map(([v,l])=>`<button class="${it.status===v?'on':''}" onclick="setStatus(${id},'${v}')">${l}</button>`).join('');
  m.classList.add('on');
  const r=ev.currentTarget.getBoundingClientRect(), mw=210, mh=m.offsetHeight||300;
  let left=Math.min(r.left, window.innerWidth-mw-8), top=r.bottom+4;
  if(top+mh>window.innerHeight-8) top=Math.max(8, r.top-mh-4);
  m.style.left=Math.max(8,left)+'px'; m.style.top=top+'px';
}
function closeStatusMenu(){$('statusMenu').classList.remove('on');}
async function setStatus(id,s){
  closeStatusMenu();
  if(!isAuthed()){requireAuth();return;}
  const it=state.items.find(x=>x.id===id); if(!it)return;
  it.status=s; render();
  try{ await sb.from('pkg_items').update({status:s}).eq('id',id); toast('상태: '+(s||'자동')); }
  catch(e){ toast('상태 저장 실패: '+e.message); loadAll(); }
}

/* 주문 이력: 전체 테이블 + 연도별 합계 */
function historyOf(itemId){
  return state.orders.filter(o=>o.itemId===itemId)
    .slice().sort((a,b)=>(b.orderDate||b.created||'').localeCompare(a.orderDate||a.created||''));
}
function orderHistoryHtml(i){
  const hist=historyOf(i.id);
  if(!hist.length)return '';
  const rows=hist.map(o=>{
    const d=o.orderDate||o.created||'-';
    let st;
    if(o.stage==='request')st='<span class="st req">요청</span>';
    else if(o.stage==='arrived')st='<span class="st done">입고완료</span>';
    else{
      const nm=STAGES.find(s=>s.id===o.stage).name;
      const dd=ddays(o.eta);
      const ddTxt=(o.stage==='ordered'&&dd!==null)?(dd>=0?` D-${dd}`:` +${-dd}일`):'';
      st=`<span class="st run">${nm.split(' · ')[0]}${ddTxt}</span>`;
    }
    const amt=o.price?('¥'+fmt(Math.round(o.qty*o.price*100)/100)):'-';
    return `<tr><td>${esc(d)}</td><td>${fmt(o.qty)}</td><td>${o.price?'¥'+esc(o.price):'-'}</td><td>${amt}</td><td style="text-align:right">${st}</td></tr>`;
  }).join('');
  // 연도별 합계 (요청 단계 제외)
  const byYear={};
  hist.filter(o=>o.stage!=='request').forEach(o=>{
    const y=(o.orderDate||o.created||'').slice(0,4)||'미상';
    byYear[y]=byYear[y]||{qty:0,amt:0};
    byYear[y].qty+=o.qty;
    byYear[y].amt+=o.qty*(o.price||0);
  });
  const yrChips=Object.keys(byYear).sort().reverse().map(y=>
    `<span class="yr-chip">${y}년 <b>${fmt(byYear[y].qty)}</b>개 · <b>¥${fmt(Math.round(byYear[y].amt))}</b></span>`).join('');
  return `<div class="hist"><h4>주문 이력 (${hist.length}건)</h4>
    <table><tr><th>발주일</th><th>수량</th><th>단가</th><th>금액</th><th>상태</th></tr>${rows}</table>
    <div class="yr-line">${yrChips}</div></div>`;
}
function lastConfirmedOrder(itemId){
  return historyOf(itemId).find(o=>o.stage!=='request');
}
function zoomSheet(id){
  const i=state.items.find(x=>x.id===id); if(!i||!i.sheet)return;
  $('zoomImg').src=i.sheet;
  $('zoomOverlay').classList.add('on');
}

/* ───────── 사진/지시서 업로드 (자동 리사이즈) ───────── */
function pickPhoto(itemId,field){if(!requireAuth())return;photoTarget={id:itemId,field};$('photoFile').click();}
function onPhotoPicked(e){
  const f=e.target.files[0]; if(!f||!photoTarget)return;
  const img=new Image();
  img.onload=async ()=>{
    const field=photoTarget.field;
    const MAX=field==='sheet'?1400:900; // 지시서는 글자가 보여야 하므로 크게
    const scale=Math.min(1,MAX/Math.max(img.width,img.height));
    const c=document.createElement('canvas');
    c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    URL.revokeObjectURL(img.src);
    const it=state.items.find(x=>x.id===photoTarget.id);
    if(!it)return;
    try{
      const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',field==='sheet'?0.85:0.78));
      const path=`items/${it.id}/${field}_${Date.now()}.jpg`;
      const up=await sb.storage.from(BUCKET).upload(path,blob,{upsert:true,contentType:'image/jpeg'});
      if(up.error)throw up.error;
      const url=sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
      if(field==='sheet'){
        it.sheet=url;
        await sb.from('pkg_items').update({sheet:url}).eq('id',it.id);
      }else{
        it.photos=[...(it.photos||[]), url];   // 여러 장 누적
        it.photo=it.photos[0];
        detailImgIdx=it.photos.length-1;        // 방금 올린 사진 보여주기
        await sb.from('pkg_items').update({photos:it.photos, photo:it.photo}).eq('id',it.id);
      }
      render();
      if($('itemOverlay').classList.contains('on')) renderItemPhotos(it.id);
      toast(field==='sheet'?'작업지시서가 등록되었습니다':`사진이 추가되었습니다 (총 ${(it.photos||[]).length}장)`);
    }catch(err){ toast('업로드 실패: '+err.message); }
  };
  img.src=URL.createObjectURL(f);
  e.target.value='';
}

/* 지시서 이미지 → 클립보드 (PNG 변환) */
async function copySheetImage(itemId){
  const i=state.items.find(x=>x.id===itemId);
  if(!i||!i.sheet){toast('작업지시서가 아직 등록되지 않았습니다 — [지시서 등록]을 먼저 눌러주세요');return;}
  try{
    const img=new Image();
    img.crossOrigin='anonymous';
    await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=i.sheet;});
    const c=document.createElement('canvas');
    c.width=img.width;c.height=img.height;
    const ctx=c.getContext('2d');
    ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
    ctx.drawImage(img,0,0);
    const blob=await new Promise(r=>c.toBlob(r,'image/png'));
    await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
    toast('작업지시서 이미지가 복사되었습니다 — 위챗에 붙여넣으세요');
  }catch(err){
    toast('이 브라우저에서는 이미지 복사가 지원되지 않습니다 — 지시서를 클릭해 크게 띄운 뒤 우클릭 → 이미지 복사를 이용하세요');
  }
}

/* ───────── 칸반 ───────── */
function renderKanban(){
  const b=$('kanbanBoard');
  b.innerHTML=STAGES.map((s,si)=>{
    const list=state.orders.filter(o=>o.stage===s.id);
    const drag=isAuthed();
    return `<div class="kcol ${s.cls}" ondragover="onColDragOver(event)" ondragleave="onColDragLeave(event)" ondrop="onColDrop(event,${si})">
      <h3>${s.name}<span class="cnt">${list.length}</span></h3>
      ${list.map(o=>{
        const it=itemOf(o)||{code:'?',nameKo:'삭제된 품목'};
        const dd=ddays(o.eta);
        let ddHtml='';
        if(o.stage==='ordered'&&dd!==null){
          const cls=dd<0?'over':(dd<=3?'soon':'far');
          ddHtml=`<span class="dday ${cls}">${dd>=0?'납기 D-'+dd:'납기 '+(-dd)+'일 지연'}</span>`;
        }
        const alias=it.alias?` <span style="color:#8a6400">'${esc(it.alias)}'</span>`:'';
        const prev=si>0?`<button onclick="moveOrder(${o.id},-1)">← 이전</button>`:'';
        const next=si<STAGES.length-1?`<button class="next" onclick="moveOrder(${o.id},1)">${nextLabel(si)} →</button>`:`<button onclick="delOrder(${o.id})">기록 삭제</button>`;
        return `<div class="ocard${drag?' draggable':''}" draggable="${drag?'true':'false'}" ondragstart="onCardDragStart(event,${o.id})" ondragend="onCardDragEnd(event)">
          <div class="oc-code">${esc(it.code)}</div>
          <div class="oc-name">${esc(it.nameKo)}${alias}</div>
          <div class="oc-qty">${fmt(o.qty)}<small> 개</small>${o.price?`<small style="margin-left:6px">¥${o.price} · ¥${fmt(Math.round(o.qty*o.price))}</small>`:''} ${ddHtml}</div>
          <div class="oc-meta">
            요청: ${esc(o.by||'-')} · ${esc(o.created||'')}${o.orderDate?`<br>발주일 ${esc(o.orderDate)} → 예상납기 ${esc(o.eta||'-')}`:''}${o.memo?`<br>${esc(o.memo)}`:''}
          </div>
          <div class="oc-btns">${prev}${next}</div>
        </div>`;
      }).join('')||'<div class="empty" style="padding:20px 0">없음</div>'}
    </div>`;
  }).join('');
}
function nextLabel(si){return ['발주 확정','제작완료 입고','포워딩 출고','국내 입고'][si]||'다음';}
/* 칸반 드래그 이동 */
let dragOrderId=null;
function onCardDragStart(e,id){ dragOrderId=id; e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',String(id));}catch(_){} e.currentTarget.classList.add('dragging'); }
function onCardDragEnd(e){ e.currentTarget.classList.remove('dragging'); dragOrderId=null; document.querySelectorAll('.kcol.drop-hover').forEach(k=>k.classList.remove('drop-hover')); }
function onColDragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; e.currentTarget.classList.add('drop-hover'); }
function onColDragLeave(e){ if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove('drop-hover'); }
function onColDrop(e,colIdx){ e.preventDefault(); e.currentTarget.classList.remove('drop-hover'); const id=dragOrderId||Number(e.dataTransfer.getData('text/plain')); dragOrderId=null; if(id)moveOrderTo(id,colIdx); }

/* ───────── 단계 이동 (재고 자동 반영, 다단계·드래그 지원) ───────── */
function moveOrder(oid,dir){                 // 버튼용: 현재에서 ±1
  const o=state.orders.find(x=>x.id===oid); if(!o)return;
  const si=STAGES.findIndex(s=>s.id===o.stage);
  moveOrderTo(oid, si+dir);
}
async function moveOrderTo(oid,targetIdx){   // 임의 단계로(드래그): 단계별 재고 반영
  if(!requireAuth())return;
  const o=state.orders.find(x=>x.id===oid); if(!o)return;
  let si=STAGES.findIndex(s=>s.id===o.stage);
  if(targetIdx<0||targetIdx>=STAGES.length||targetIdx===si)return;
  const it=itemOf(o);
  let stockChanged=false;
  const dir=targetIdx>si?1:-1;
  while(si!==targetIdx){
    const from=STAGES[si].id, to=STAGES[si+dir].id;
    if(dir>0){
      if(from==='request'&&to==='ordered'){ o.orderDate=o.orderDate||today(); o.eta=o.eta||addDays(o.orderDate,(it&&it.lead)||14); }
      if(from==='ordered'&&to==='chinaWh'&&it){ it.stock.china+=o.qty; stockChanged=true; }
      if(from==='chinaWh'&&to==='forwarder'&&it){ it.stock.china-=o.qty; it.stock.forwarder+=o.qty; stockChanged=true; }
      if(from==='forwarder'&&to==='arrived'&&it){ it.stock.forwarder-=o.qty; it.stock.korea+=o.qty; stockChanged=true; }
    } else {
      if(from==='ordered'&&to==='request'){ o.orderDate=''; o.eta=''; }
      if(from==='chinaWh'&&to==='ordered'&&it){ it.stock.china-=o.qty; stockChanged=true; }
      if(from==='forwarder'&&to==='chinaWh'&&it){ it.stock.forwarder-=o.qty; it.stock.china+=o.qty; stockChanged=true; }
      if(from==='arrived'&&to==='forwarder'&&it){ it.stock.korea-=o.qty; it.stock.forwarder+=o.qty; stockChanged=true; }
    }
    si+=dir;
  }
  o.stage=STAGES[targetIdx].id;
  render();
  try{
    await dbUpdateOrder(o);
    if(stockChanged&&it) await dbUpdateItemStock(it);
    toast(`[${(it&&it.code)||''}] ${STAGES[targetIdx].name} 단계로 이동`);
  }catch(e){ toast('이동 저장 실패: '+e.message+' — 새로고침 후 재시도'); loadAll(); }
}
async function delOrder(oid){
  if(!requireAuth())return;
  if(!confirm('입고 완료된 이 주문 기록을 삭제할까요?\n(재고 수치는 유지되지만, "발주 N회" 집계에서 빠져 정렬 순서에 영향을 줍니다)'))return;
  try{
    await dbDeleteOrder(oid);
    state.orders=state.orders.filter(o=>o.id!==oid);
    render();
  }catch(e){ toast('삭제 실패: '+e.message); }
}

/* ───────── 중문 메시지 ───────── */
function copyReorderMsg(itemId){

  const msg=`您好！我们想再订购包装，麻烦确认一下：\n\n品名：${i.nameCn||i.nameEn}\n规格：${i.spec}\n数量：${fmt(last?last.qty:i.moq)}个（如有变动我再告诉您）${lastLine}\n\n作业指示书图片我发给您。请确认单价和交货期，做好后先放你们仓库保管，谢谢！🙏`;
  copyText(msg,'재주문 메시지 복사 완료 (직전 주문 조건 포함) — 이어서 [지시서 이미지 복사]도 눌러주세요');

function requestShipment(itemId){
  const i=state.items.find(x=>x.id===itemId); if(!i)return;
  if(!i.stock.china){toast('중국창고 보관 수량이 0입니다');return;}
  const q=prompt(`중국창고 보관 ${fmt(i.stock.china)}개 중 몇 개를 출고 요청할까요?`,i.stock.china);

  copyText(msg,'출고요청 메시지 복사 완료 — 발송 확인 후 칸반에서 단계를 이동하세요');

function copyNasPath(itemId){

  if(!i.nasPath){toast('NAS 경로가 미등록입니다 — [품목 정보 수정]에서 입력하세요');return;}

function copyFlowUrl(itemId){

  if(!i.flowUrl){toast('FLOW 기획서 URL이 미등록입니다 — [품목 정보 수정]에서 입력하세요');return;}
  copyText(i.flowUrl,'FLOW 기획서 URL이 복사되었습니다');
}
function openBuyUrl(itemId){   // 링크가 있으면 새 탭으로 바로 열기
  const i=state.items.find(x=>x.id===itemId); if(!i)return;
  if(!i.buyUrl){toast('구매링크가 미등록입니다 — [품목 정보 수정]에서 입력하세요');return;}
  window.open(i.buyUrl,'_blank','noopener');
}

/* ───────── 재고 인라인 수정 (상세카드, 로그인 시) ───────── */
let stockEditing=false;
const STK_LABEL={china:'중국창고',forwarder:'포워딩',korea:'국내'};
function beginStockEdit(id,field,el){
  if(!isAuthed()){requireAuth();return;}
  if(stockEditing)return;
  const it=state.items.find(x=>x.id===id); if(!it)return;
  stockEditing=true;
  const cur=it.stock[field];
  el.innerHTML=`<input class="stk-edit" type="number" min="0" value="${cur}">`;
  const inp=el.firstChild; inp.focus(); inp.select();
  let done=false;
  const flush=()=>{ if(pendingReload){pendingReload=false;scheduleReload();} };
  const finish=async(save)=>{
    if(done)return; done=true; stockEditing=false;
    if(!save){render();flush();return;}
    const v=Math.max(0,Math.round(Number(inp.value)||0));
    if(v===cur){render();flush();return;}
    it.stock[field]=v; render();
    try{ await dbUpdateItemStock(it); toast(`${it.code} ${STK_LABEL[field]} 재고 ${fmt(v)}개로 수정`); }
    catch(e){ toast('저장 실패: '+e.message); loadAll(); }
  };
  inp.onblur=()=>finish(true);
  inp.onclick=(e)=>e.stopPropagation();
  inp.onkeydown=(e)=>{
    e.stopPropagation();
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
    else if(e.key==='Escape'){done=true;stockEditing=false;render();flush();}
  };
}

/* ───────── 품목 CRUD ───────── */
function openItemModal(id){
  if(!requireAuth())return;
  editingItemId=id||null;
  $('itemModalTitle').textContent=id?'품목 수정':'품목 등록';
  const i=id?state.items.find(x=>x.id===id):null;
  $('i_code').value=i?i.code:''; $('i_nameKo').value=i?i.nameKo:'';
  $('i_type').value=i?i.type:'비닐'; $('i_cat').value=i?i.cat:''; $('i_alias').value=i?i.alias:'';
  $('i_nameEn').value=i?i.nameEn:''; $('i_nameCn').value=i?i.nameCn:'';
  $('i_spec').value=i?i.spec:''; $('i_price').value=i?i.price:'';
  $('i_moq').value=i?i.moq:''; $('i_lead').value=i?i.lead:'';
  $('i_sChina').value=i?i.stock.china:0; $('i_sFwd').value=i?i.stock.forwarder:0; $('i_sKr').value=i?i.stock.korea:0;
  $('i_safety').value=i?i.safety:0; $('i_memo').value=i?i.memo:'';
  $('i_nas').value=i?i.nasPath:''; $('i_flow').value=i?i.flowUrl:''; $('i_buy').value=i?i.buyUrl:''; $('i_status').value=i?i.status:'';
  renderItemPhotos(id||null);
  closeModal('detailOverlay');
  $('itemOverlay').classList.add('on');
  markClean('itemOverlay');
}
async function saveItem(){
  const d={
    code:$('i_code').value.trim(), nameKo:$('i_nameKo').value.trim(),
    type:$('i_type').value, cat:$('i_cat').value.trim(), alias:$('i_alias').value.trim(),
    nameEn:$('i_nameEn').value.trim(), nameCn:$('i_nameCn').value.trim(),
    spec:$('i_spec').value.trim(), price:Number($('i_price').value)||0,
    moq:Number($('i_moq').value)||0, lead:Number($('i_lead').value)||14,
    safety:Number($('i_safety').value)||0, memo:$('i_memo').value.trim(),
    nasPath:$('i_nas').value.trim(), flowUrl:$('i_flow').value.trim(), buyUrl:$('i_buy').value.trim(), status:$('i_status').value,
    stock:{china:Number($('i_sChina').value)||0, forwarder:Number($('i_sFwd').value)||0, korea:Number($('i_sKr').value)||0}
  };
  if(!d.nameKo){toast('한국명은 필수입니다');return;}
  try{
    if(editingItemId){ const it=state.items.find(x=>x.id===editingItemId); Object.assign(it,d); await dbUpdateItem(it); }
    else{ d.photo=null; d.sheet=null; d.id=await dbInsertItem(d); state.items.push(d); }
    closeModal('itemOverlay');render();toast('저장되었습니다');
  }catch(e){ toast('저장 실패: '+e.message); }
}

/* ───────── 발주 요청 ───────── */
function openOrderModal(itemId){
  if(!requireAuth())return;
  $('o_item').innerHTML=state.items.map(i=>`<option value="${i.id}" ${i.id===itemId?'selected':''}>[${esc(i.code)}] ${esc(i.nameKo)}${i.alias?` ('${esc(i.alias)}')`:''}</option>`).join('');
  $('o_by').value=''; $('o_memo').value='';
  prefillOrder();
  closeModal('detailOverlay');
  $('orderOverlay').classList.add('on');
  markClean('orderOverlay');
}
function prefillOrder(){
  const i=state.items.find(x=>x.id===Number($('o_item').value));
  if(!i)return;
  const last=lastConfirmedOrder(i.id);
  $('o_qty').value=last?last.qty:i.moq;
  $('o_price').value=(last&&last.price)||i.price||'';
  $('o_lastinfo').textContent=last
    ?`직전 주문: ${last.orderDate||last.created} · ${fmt(last.qty)}개 · ¥${last.price||'-'}`
    :'첫 주문 품목입니다 (수량은 MOQ 기준)';
}
/* 물류팀 원클릭 발주 — 폼 없이 바로 [발주 요청] 칸반에 카드 생성 */
async function quickOrder(itemId){
  if(!requireAuth())return;
  const i=state.items.find(x=>x.id===itemId); if(!i)return;
  const last=lastConfirmedOrder(itemId);
  const o={ itemId, stage:'request',
    qty:(last?last.qty:i.moq)||0, price:(last&&last.price)||i.price||0,
    by:(session&&session.user&&session.user.email)||'물류팀', memo:'',
    orderDate:'', eta:'', created:today() };
  try{
    await dbInsertOrder(o);
    state.orders.unshift(o);
    render();
    toast(`[${i.code||i.nameKo}] 발주 요청이 들어왔습니다 — [주문 칸반]에서 확인`);
  }catch(e){ toast('요청 실패: '+e.message); }
}
async function saveOrder(){
  const itemId=Number($('o_item').value);
  const qty=Number($('o_qty').value);
  const price=Number($('o_price').value)||0;
  if(!qty){toast('수량을 입력하세요');return;}
  const o={ itemId, stage:'request', qty, price,
    by:$('o_by').value.trim(), memo:$('o_memo').value.trim(),
    orderDate:'', eta:'', created:today() };
  try{
    await dbInsertOrder(o);
    state.orders.unshift(o);
    closeModal('orderOverlay');
    switchView('kanban');
    toast('발주 요청이 올라갔습니다 — [발주 요청] 칸에서 확인하세요');
  }catch(e){ toast('요청 실패: '+e.message); }
}

function closeModal(id){$(id).classList.remove('on');}

/* ── 폼 미저장 경고 ── */
const ITEM_FIELDS=['i_code','i_nameKo','i_type','i_status','i_cat','i_alias','i_nameEn','i_nameCn','i_spec','i_price','i_moq','i_lead','i_sChina','i_sFwd','i_sKr','i_safety','i_memo','i_buy','i_nas','i_flow'];
const ORDER_FIELDS=['o_item','o_qty','o_price','o_by','o_memo'];
let formSnap={};
function snapForm(fields){return fields.map(id=>$(id).value).join('');}
function markClean(overlayId){
  if(overlayId==='itemOverlay')formSnap.item=snapForm(ITEM_FIELDS);
  else if(overlayId==='orderOverlay')formSnap.order=snapForm(ORDER_FIELDS);
}
function isDirty(overlayId){
  if(overlayId==='itemOverlay')return snapForm(ITEM_FIELDS)!==formSnap.item;
  if(overlayId==='orderOverlay')return snapForm(ORDER_FIELDS)!==formSnap.order;
  return false;
}
function tryClose(overlayId){
  if(isDirty(overlayId)&&!confirm('저장하지 않은 내용이 있습니다. 저장하지 않고 닫을까요?'))return;
  closeModal(overlayId);
  if(overlayId==='detailOverlay')detailItemId=null;
}
document.querySelectorAll('.overlay').forEach(ov=>{
  if(ov.id==='zoomOverlay')return;
  ov.addEventListener('click',e=>{if(e.target===ov)tryClose(ov.id);});
});
/* Esc 로 닫기 (인라인 재고 편집은 자체 처리) */
document.addEventListener('keydown',e=>{
  if(e.key!=='Escape'||stockEditing)return;
  const open=[...document.querySelectorAll('.overlay.on')].pop();
  if(!open)return;
  if(open.id==='zoomOverlay'){open.classList.remove('on');return;}
  tryClose(open.id);
});

/* ───────── 뷰 전환 / 데이터 IO ───────── */
function switchView(v){
  currentView=v;
  $('viewItems').style.display=v==='items'?'':'none';
  $('viewKanban').style.display=v==='kanban'?'':'none';
  $('sidebar').style.display=v==='items'?'':'none';
  $('tabItems').classList.toggle('on',v==='items');
  $('tabKanban').classList.toggle('on',v==='kanban');
  render();
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`spaceshield_packaging_${today()}.json`;
  a.click();
  toast('JSON 파일로 저장했습니다 (사진·지시서 포함)');
}

render();
initAuth();
loadAll();
initRealtime();
</script>
